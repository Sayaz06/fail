<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cloud Drive | Sayaz06</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#020617" />
  <link rel="icon" type="image/png" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="delete-overlay" class="modal hidden" style="z-index: 2000; background: rgba(0,0,0,0.85);">
    <div class="container" style="text-align: center; max-width: 300px; padding: 20px;">
      <div class="item-icon" style="color: var(--file); font-size: 50px;">🗑️</div>
      <h3 class="section-title">Sedang memadam...</h3>
      <p class="status-msg" style="color: white !important;">Sila tunggu, sistem sedang mengosongkan storan...</p>
    </div>
  </div>

  <div id="page-login" class="page">
    <div class="container">
      <h1 class="app-title">Fail Peribadi</h1>
      <p class="subtext">Akses terhad. Sila log masuk dengan Google untuk menguruskan fail anda.</p>
      
      <button id="btn-login-google" class="btn-primary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.1rem; padding: 15px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48" style="background: white; border-radius: 50%; padding: 1px;">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Log Masuk dengan Google
      </button>
      <span id="auth-msg" class="status-msg hidden" style="margin-top: 12px; display: block;"></span>
    </div>
  </div>

  <div id="page-home" class="page hidden">
    <header class="home-header">
      <div class="header-left">
        <h2 class="brand">Fail Saya</h2>
        <div id="breadcrumb" style="display: flex; align-items: center; gap: 8px; margin-top: 6px;">
          <button id="btn-back" class="btn-ghost small hidden" style="padding: 4px 10px; font-size: 0.8rem;">⬅ Kembali</button>
          <span id="current-folder-name" style="font-size: 0.9rem; color: #9ca3af;">Utama (Root)</span>
        </div>
      </div>
      <div class="header-right">
        <button id="btn-logout" class="btn-ghost">Log Keluar</button>
      </div>
    </header>

    <main class="home-main">
      <div class="toolbar">
        <input id="search" type="search" class="input" placeholder="Cari fail atau folder..." />
        <div class="upload-group">
          <button id="btn-new-folder" class="btn-ghost">+ Folder Baru</button>
          <button id="btn-upload" class="btn-primary">+ Muat Naik</button>
          <button id="btn-paste" class="btn-primary hidden" style="background: #10b981; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);">📋 Tampal di sini</button>
          <input id="file-input" type="file" class="hidden" multiple />
        </div>
      </div>

      <div id="multi-select-toolbar" class="hidden" style="background: var(--card-bg); border: 1px solid var(--border); padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <span id="select-count" style="font-weight: bold; color: var(--indigo);">0 item dipilih</span>
        <div style="display: flex; gap: 10px;">
          <button id="btn-cut-selected" class="btn-primary" style="background: #f59e0b; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);">✂️ Pindah Pilihan</button>
          <button id="btn-cancel-select" class="btn-ghost">Batal</button>
        </div>
      </div>

      <div id="upload-progress" class="progress hidden" style="margin-bottom: 16px;">
        <div id="upload-bar" class="progress-bar"></div>
        <span id="upload-label" class="progress-label">Sedia...</span>
      </div>

      <section id="item-list" class="gallery">
        </section>
    </main>
  </div>

  <script type="module" src="./firebase.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
